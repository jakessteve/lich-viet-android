  <link rel="canonical" href="https://lichviet.app/" />

  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:;
        style-src 'self' 'unsafe-inline';
        style-src-elem 'self' 'unsafe-inline';
        style-src-attr 'unsafe-inline';
        font-src 'self' data:;
        img-src 'self' data: blob: https://*.tile.openstreetmap.org https://unpkg.com;
        connect-src 'self' ws: wss: https://date.nager.at https://ipapi.co https://nominatim.openstreetmap.org;
        frame-src 'none';
        object-src 'none';
        base-uri 'self';
      " />

  <!-- Referrer Policy -->
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <!-- X-Content-Type-Options equivalent -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />

  <!-- Note: X-Frame-Options and frame-ancestors must be set via HTTP headers, not meta tags.
       Configure these in your web server (nginx/Apache) or hosting platform (Vercel/Netlify). -->

  <!-- Restrict unused browser features -->
  <meta http-equiv="Permissions-Policy" content="geolocation=(), camera=(), microphone=(), payment=(), usb=()" />

  <title>Lịch Việt — Âm Lịch, Gieo Quẻ &amp; Tử Vi</title>

  <link rel="preload" href="/fonts/noto-sans-vietnamese.woff2" as="font" type="font/woff2" crossorigin fetchpriority="high" />
  <link rel="preload" href="/fonts/material-icons-round.woff2" as="font" type="font/woff2" crossorigin />

  <!-- P1-6: Critical CSS — inline above-the-fold skeleton to prevent layout shift -->

    :root { --gold: #b8860b; }
    html { font-family: 'Noto Sans', system-ui, -apple-system, sans-serif; }
    body { margin: 0; background: #F5F5F7; color: #1D1D1F; }
    .dark body { background: #0a0a1a; color: #F5F5F7; }
    #root { min-height: 100vh; }
  </style>

  <!-- JSON-LD Structured Data -->
